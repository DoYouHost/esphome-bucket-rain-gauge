---
# Skeleton ESPHome configuration. Rename this file to match `files[0]` in
# project.yaml and fill in the project-specific configuration.
#
# Generate fresh API_KEY / OTA_PASSWORD values before first build:
#   esphome-keygen
#   openssl rand -base64 24

substitutions:
  API_KEY: "REPLACE_WITH_BASE64_KEY"
  OTA_PASSWORD: "REPLACE_WITH_OTA_PASSWORD"
  PROD_MANIFEST_URL: "https://morganmlg.com/ProjectTemplate/manifest.json"
  BETA_MANIFEST_URL: "https://morganmlg.com/ProjectTemplate/manifest-beta.json"
  WEB_USERNAME: "esphome"
  WEB_PASSWORD: "esphome"
  AP_SSID: "Project Template"
  AP_PASSWORD: "esphome-fallback"

esphome:
  name: project-template
  friendly_name: "Project Template"
  comment: "ESP32 based DoYouHost project"
  name_add_mac_suffix: true
  project:
    name: "DoYouHost.ProjectTemplate"
    version: "dev"

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    version: recommended

dashboard_import:
  package_import_url: github://DoYouHost/ProjectTemplate/esp32-template.yml@main
  import_full_config: false

packages:
  DoYouHost/ESPHomeTemplates:
    url: https://github.com/DoYouHost/ESPHomeTemplates
    files:
      - basic.yaml
      - debug.yaml
      - updateBetaProdStaging.yaml
      - wifiInfo.yaml
    ref: main
    refresh: 0d

wifi:
  reboot_timeout: 15min
  enable_btm: true
  enable_rrm: true
  ap:
    ssid: "${AP_SSID}"
    password: "${AP_PASSWORD}"

captive_portal:

improv_serial:

api:
  reboot_timeout: 15min
  encryption:
    key: "${API_KEY}"

ota:
  - platform: esphome
    password: "${OTA_PASSWORD}"

substitutions:
  OTA_PASSWORD: "OwRKb2kXFQT0NFhk7/ydpE+YCV+4ytk0"
  PROD_MANIFEST_URL: "https://morganmlg.com/BucketRainGauge/manifest.json"
  BETA_MANIFEST_URL: "https://morganmlg.com/BucketRainGauge/manifest-beta.json"
  WEB_USERNAME: "esphome"
  WEB_PASSWORD: "esphome"
  AP_SSID: "Bucket Rain Gauge"
  AP_PASSWORD: "esphome-fallback"
  HALL_SENSOR_PIN: "GPIO3"
  # I2C bus. GPIO6/GPIO7 = XIAO C3 pads D4/D5.
  I2C_SDA_PIN: "GPIO6"
  I2C_SCL_PIN: "GPIO7"

esphome:
  name: bucket-rain-gauge
  friendly_name: "Bucket Rain Gauge"
  comment: "ESP32-C3 tipping-bucket rain gauge"
  name_add_mac_suffix: true
  project:
    name: "DoYouHost.BucketRainGauge"
    version: "dev"

esp32:
  board: seeed_xiao_esp32c3
  toolchain: esp-idf
  framework:
    type: esp-idf
    version: recommended

dashboard_import:
  package_import_url: github://DoYouHost/esphome-bucket-rain-gauge/bucket-rain-gauge.yml@main
  import_full_config: false

packages:
  DoYouHost/ESPHomeTemplates:
    url: https://github.com/DoYouHost/ESPHomeTemplates
    files:
      - basic.yaml
      - debug.yaml
      - buttons.yaml
      - updateBetaProdStaging.yaml
      - wifiInfo.yaml
    ref: main
    refresh: 0d

wifi:
  reboot_timeout: 15min
  enable_btm: true
  enable_rrm: true
  ap:
    ssid: "${AP_SSID}"
    password: "${AP_PASSWORD}"
  on_connect:
    - script.execute: improv_disable_grace
  on_disconnect:
    - script.stop: improv_disable_grace
    - lambda: "id(improv_ble).start();"

captive_portal:

improv_serial:

esp32_improv:
  id: improv_ble
  authorizer: none

provisioning:
  timeout: 5min

api:
  reboot_timeout: 15min
  encryption:
    # key: !secret api_key

ota:
  - platform: esphome
    password: "${OTA_PASSWORD}"

i2c:
  sda: ${I2C_SDA_PIN}
  scl: ${I2C_SCL_PIN}
  scan: true

script:
  - id: improv_disable_grace
    mode: restart
    then:
      - delay: 10s
      - lambda: "id(improv_ble).stop();"

time:
  - platform: homeassistant
    id: ha_time
    on_time:
      # Daily: every day at local midnight.
      - hours: 0
        minutes: 0
        seconds: 0
        then:
          - lambda: "id(rain_daily_mm) = 0;"
      # Weekly: Monday at midnight.
      - hours: 0
        minutes: 0
        seconds: 0
        days_of_week: MON
        then:
          - lambda: "id(rain_weekly_mm) = 0;"
      # Monthly: 1st of the month at midnight.
      - hours: 0
        minutes: 0
        seconds: 0
        days_of_month: 1
        then:
          - lambda: "id(rain_monthly_mm) = 0;"
      # Annual: 1 January at midnight.
      - hours: 0
        minutes: 0
        seconds: 0
        days_of_month: 1
        months: JAN
        then:
          - lambda: "id(rain_annual_mm) = 0;"

sensor:
  - platform: adc
    pin: ${HALL_SENSOR_PIN}
    id: hall_voltage
    name: "Hall Sensor Voltage"
    attenuation: 12db
    update_interval: 1s
    samples: 16
    unit_of_measurement: "V"
    accuracy_decimals: 3
    device_class: voltage
    state_class: measurement
    entity_category: diagnostic
    filters:
      - median:
          window_size: 5
          send_every: 1
          send_first_at: 1

  - platform: aht10
    variant: AHT20
    address: 0x38
    update_interval: 60s
    temperature:
      name: "Temperature"
      filters:
        - exponential_moving_average:
            alpha: 0.3
    humidity:
      name: "Humidity"
      filters:
        - exponential_moving_average:
            alpha: 0.3

  - platform: bmp280_i2c
    address: 0x77
    update_interval: 60s
    iir_filter: "OFF"
    pressure:
      name: "Pressure"
      oversampling: 16x
      filters:
        - exponential_moving_average:
            alpha: 0.3
    temperature:
      id: bmp280_temperature
      internal: true
      oversampling: 16x

  - platform: template
    name: "Total Rainfall"
    id: rain_total
    unit_of_measurement: "mm"
    device_class: precipitation
    icon: "mdi:cup-water"
    accuracy_decimals: 2
    state_class: total_increasing
    update_interval: 60s
    lambda: "return id(rain_total_mm);"

  - platform: template
    name: "Rainfall Today"
    id: rain_daily
    unit_of_measurement: "mm"
    device_class: precipitation
    icon: "mdi:cup-water"
    accuracy_decimals: 2
    state_class: total_increasing
    disabled_by_default: true
    update_interval: 60s
    lambda: "return id(rain_daily_mm);"

  - platform: template
    name: "Rainfall This Week"
    id: rain_weekly
    unit_of_measurement: "mm"
    device_class: precipitation
    icon: "mdi:cup-water"
    accuracy_decimals: 2
    state_class: total_increasing
    disabled_by_default: true
    update_interval: 60s
    lambda: "return id(rain_weekly_mm);"

  - platform: template
    name: "Rainfall This Month"
    id: rain_monthly
    unit_of_measurement: "mm"
    device_class: precipitation
    icon: "mdi:cup-water"
    accuracy_decimals: 2
    state_class: total_increasing
    disabled_by_default: true
    update_interval: 60s
    lambda: "return id(rain_monthly_mm);"

  - platform: template
    name: "Rainfall This Year"
    id: rain_annual
    unit_of_measurement: "mm"
    device_class: precipitation
    icon: "mdi:cup-water"
    accuracy_decimals: 2
    state_class: total_increasing
    disabled_by_default: true
    update_interval: 60s
    lambda: "return id(rain_annual_mm);"

  - platform: template
    name: "Rain Rate"
    id: rain_rate_1min
    unit_of_measurement: "mm/min"
    icon: "mdi:weather-pouring"
    accuracy_decimals: 2
    state_class: measurement
    update_interval: 60s
    lambda: |-
      int count = id(rain_count);
      id(rain_count) = 0;
      return count * id(rain_mm_per_tip).state;

  - platform: template
    name: "Rain Rate (10 min avg)"
    id: rain_rate_10min
    unit_of_measurement: "mm/min"
    icon: "mdi:weather-pouring"
    accuracy_decimals: 2
    state_class: measurement
    update_interval: 600s
    lambda: |-
      int count = id(rain_count_10);
      id(rain_count_10) = 0;
      return count * id(rain_mm_per_tip).state / 10.0;

  - platform: template
    name: "Rain Rate (hourly)"
    id: rain_rate_60min
    unit_of_measurement: "mm/h"
    device_class: precipitation_intensity
    icon: "mdi:weather-pouring"
    accuracy_decimals: 2
    state_class: measurement
    update_interval: 3600s
    lambda: |-
      int count = id(rain_count_60);
      id(rain_count_60) = 0;
      return count * id(rain_mm_per_tip).state;

number:
  - platform: template
    id: tip_threshold
    name: "Tip Threshold"
    entity_category: config
    optimistic: true
    restore_value: true
    initial_value: "1.65"
    min_value: 0.0
    max_value: 3.3
    step: 0.01
    unit_of_measurement: "V"
    mode: box

  - platform: template
    id: rain_mm_per_tip
    name: "Rain Per Tip"
    entity_category: config
    optimistic: true
    restore_value: true
    initial_value: "0.64"
    min_value: 0.01
    max_value: 5.0
    step: 0.01
    unit_of_measurement: "mm"
    mode: box

switch:
  - platform: template
    id: tip_on_falling
    name: "Tip On Falling Signal"
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF

globals:
  - id: rain_count
    type: int
    restore_value: false
    initial_value: '0'
  - id: rain_count_10
    type: int
    restore_value: false
    initial_value: '0'
  - id: rain_count_60
    type: int
    restore_value: false
    initial_value: '0'
  - id: rain_total_mm
    type: float
    restore_value: true
    initial_value: '0'
  - id: rain_daily_mm
    type: float
    restore_value: true
    initial_value: '0'
  - id: rain_weekly_mm
    type: float
    restore_value: true
    initial_value: '0'
  - id: rain_monthly_mm
    type: float
    restore_value: true
    initial_value: '0'
  - id: rain_annual_mm
    type: float
    restore_value: true
    initial_value: '0'

binary_sensor:
  - platform: template
    id: bucket_position
    name: "Bucket Position"
    lambda: |-
      float v = id(hall_voltage).state;
      if (isnan(v)) return {};  // keep last state until a valid reading
      float t = id(tip_threshold).state;
      return id(tip_on_falling).state ? (v < t) : (v > t);
    on_state:
      then:
        - lambda: |-
            id(rain_count) += 1;
            id(rain_count_10) += 1;
            id(rain_count_60) += 1;
            float mm = id(rain_mm_per_tip).state;
            id(rain_total_mm) += mm;
            id(rain_daily_mm) += mm;
            id(rain_weekly_mm) += mm;
            id(rain_monthly_mm) += mm;
            id(rain_annual_mm) += mm;
